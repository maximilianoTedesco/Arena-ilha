<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agendamento | Grupo Rodrigo Ilha</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body id="bookingBody">
  <main class="booking-page">
  <div class="booking-carousel" id="bookingCarousel"></div>
  <div class="booking-overlay"></div>
    <section class="booking-card">
      <a href="arenas.html" class="back-link top-back">← Trocar arena</a>

      <div class="booking-header">
        <img id="arenaLogo" src="" alt="Logo da arena" class="booking-logo" />
        <span class="booking-label">Agendamento de futsal</span>
        <h1 id="arenaTitle">Arena</h1>
        <p>Escolha o dia, horário e preencha seus dados para confirmar.</p>
      </div>

      <form id="bookingForm" class="booking-form">
        <label>
          Nome completo
          <input type="text" id="nome" placeholder="Seu nome" required />
        </label>

        <label>
          WhatsApp
          <input type="tel" id="whatsapp" placeholder="51999999999" required />
        </label>

        <label>
          Data
          <input type="date" id="data" required />
        </label>

        <div>
          <span class="field-title">Horário disponível</span>
          <div id="timeGrid" class="time-grid"></div>
        </div>

        <label>
          Observação
          <textarea id="observacao" rows="3" placeholder="Ex: jogo entre amigos, mensalista, etc."></textarea>
        </label>

        <button type="submit" class="btn booking-btn">Confirmar agendamento</button>
      </form>

      <div id="successBox" class="success-box hidden">
        <h2>Horário selecionado!</h2>
        <p id="successText"></p>
        <a id="whatsLink" class="btn whatsapp-btn" target="_blank">Enviar pelo WhatsApp</a>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
